<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>SIRP - Cadastro</title>
    <link rel="icon" type="image/png" href="/assets/sirp_logo_min.png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/assets/sirp_logo_max.png" alt="Logo SIRP" class="logo">
        </a>
    </header>

    <main>
        <form class="cadastro" action="/sign-up" method="POST">
            <h2>Cadastro</h2>

            {% if request.query_params.get('error') == 'signup' %}
            <div id="mensagem-erro" class="visivel">
                &#9888;&#65039; Erro ao cadastrar. Email ou usuário já existe.
            </div>
            {% else %}
            <div id="mensagem-erro">
                &#9888;&#65039; Erro ao cadastrar.
            </div>
            {% endif %}

            <div class="input-group">
                <label for="username">Nome de Usuário:</label>
                <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
            </div>
            <div class="input-group">
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" value="@ufrpe.br" required>
            </div>

            <div class="input-group">
                <label for="tellNum">Telefone:</label>
                <input type="text" id="tellNum" name="tellNum" placeholder="Ex: 81900000000" maxlength="13" minlength="11" required>
            </div>

            <div class="input-group">
                <label for="password">Senha:</label>
                <div class="senha-wrapper">
                    <input type="password" id="password" name="password" minlength="8" required>
                    <button type="button" id="btn-olho" aria-label="Mostrar senha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="cta" type="submit">Cadastrar</button>
            <a href="/" class="link">Já tenho uma conta!</a>
        </form>
    </main>

    <footer>
        <p id="copy">&COPY; 2026 System Integration Ruralinda Problems. Todos os direitos reservados.</p>
        <div id="footer-contact">
            <h3>Entre em Contato</h3>
            <a href="mailto:jezreel.david@ufrpe.br">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mail">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>
            <a href="tel:+5581983606736">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-phone">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </a>
        </div>
    </footer>

    <script>
        document.getElementById('btn-olho').addEventListener('click', function() {
            var senha = document.getElementById('password');
            if (senha.type === 'password') {
                senha.type = 'text';
            } else {
                senha.type = 'password';
            }
        });
    </script>
</body>
</html>
