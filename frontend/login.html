<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>SIRP - Login</title>
    <link rel="icon" type="image/png" href="assets/sirp_logo_min.png">
</head>
<body>
    <header>
        <a href="index.html">
            <img src="assets/sirp_logo_max.png" alt="Logo SIRP" class="logo">
        </a>
        
    </header>

    <main> 
        <form>
            <h2>Login</h2>

            <div id="mensagem-erro">
                ⚠️ E-mail ou senha incorretos!
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="text" id="email" value="@ufrpe.br" placeholder="Seu email">
            </div>
        
            <div class="input-group">
                <label for="senha">Senha:</label>
                <div class="senha-wrapper">
                    <input type="password" id="senha">
                    <button type="button" id="btn-olho" aria-label="Mostrar senha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <button class="cta" type="submit" disabled>Logar</button>

            <a href="#" class="link">Esqueceu a senha?</a>
            <a href="cadastro.html" class="link">Não tenho uma conta!</a>
            
            <div id="mensagem-sms">
                📱 Um SMS com a nova senha chegará em breve!
            </div>
        </form>
        
    </main>

    <footer>
        <p id="copy">&COPY; 2026 System Integration Ruralinda Problems. Todos os direitos reservados.</p>
        <div id="footer-contact">
            <h3>Entre em Contato</h3>
            <a href="mailto:jezreel.david@ufrpe.br">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mail">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>
            <a href="tel:+5581983606736">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-phone">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </a>
        </div>    
    </footer>
</body>
</html>
