<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Reportar - SIRP</title>
    <link rel="icon" type="image/png" href="assets/sirp_logo_min.png">
</head>
<body>
    <header>
        <a href="index.html">
            <img src="assets/sirp_logo_max.png" alt="Logo SIRP" class="logo">
        </a>
        <div class="menu-wrapper">
            <nav id="menu-extensivel">
                <a href="perfil.html">Perfil</a>
                <a href="index.html">Problemas</a>
                <a href="login.html">Logout</a>
            </nav>
            <button id="menu" aria-label="Abrir menu" onclick="document.getElementById('menu-extensivel').classList.toggle('aberto')">
                <i class="fa-solid fa-bars" style="font-size: 24px; color: var(--laranja);"></i>
            </button>
        </div>
    </header>

    <main class="main-container">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h2><i class="fa-solid fa-robot"></i> Analista Técnico SIRP</h2>
                <span class="status-badge">Conexão Segura</span>
            </div>
            
            <div class="chat-messages" id="chat-box">
                <div id="typingIndicator" class="typing-indicator" style="display: none;">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="chat-input-container">
                <button id="btn-refresh" title="Reiniciar Conversa" aria-label="Reiniciar conversa">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <input type="text" id="input-mensagem" placeholder="Descreva o gargalo ou sua ideia...">
                <button id="btn-enviar">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div id="modal-final-sirp" class="modal-exportacao">
            <h3 style="color: var(--bege); margin-bottom: 10px;">Processo Concluído!</h3>
            <p style="color: var(--branco); font-size: 0.95rem;">Deseja exportar uma imagem ou vídeo de complemento? (Apenas 1 arquivo)</p>
            
            <div class="modal-botoes">
                <button class="btn-modal imagem" onclick="ativarSeletorMidia('image/*')"><i class="fa-solid fa-image"></i> Imagem</button>
                <button class="btn-modal video" onclick="ativarSeletorMidia('video/*')"><i class="fa-solid fa-video"></i> Vídeo</button>
                <button class="btn-modal recusar" onclick="encerrarEIrParaPerfil()"><i class="fa-solid fa-xmark"></i> Não</button>
            </div>
            
            <input type="file" id="input-midia-final" style="display: none;" onchange="processarMidiaFinal(this)">
            <div id="preview-modal-box" style="margin-top: 15px; display: none;"></div>
        </div>
    </main>

    <footer>
        <p id="copy">&copy; 2026 System Integration Ruralinda Problems. Todos os direitos reservados.</p>
        <div id="footer-contact">
            <h3>Entre em Contato</h3>
            <a href="mailto:jezreel.david@ufrpe.br"><i class="fa-solid fa-envelope" style="font-size: 20px;"></i></a>
            <a href="tel:+5581983606736"><i class="fa-solid fa-phone" style="font-size: 20px;"></i></a>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById('input-mensagem');
            const btnEnviar = document.getElementById('btn-enviar');
            const btnRefresh = document.getElementById('btn-refresh');
            const chatBox = document.getElementById('chat-box');
            const typingIndicator = document.getElementById('typingIndicator');

            // Inicia zerando o bot
            fetch('/api/reset', { method: 'POST' })
                .then(res => res.json())
                .then(data => renderizarBot(data.mensagem_inicial || data.message));

            function rolarFinal() { chatBox.scrollTop = chatBox.scrollHeight; }

            function renderizarUser(msg) {
                const div = document.createElement('div');
                div.className = 'mensagem user';
                div.innerHTML = `<div class="texto"><strong>Você:</strong> ${msg}</div>`;
                chatBox.insertBefore(div, typingIndicator);
                rolarFinal();
            }

            function renderizarBot(msg, abstracao = null, concluido = false) {
                let tabelaHtml = '';
                // Renderiza a tabela limpa sempre que houver dados estruturados
                if (abstracao && typeof abstracao === 'object' && Object.keys(abstracao).length > 0 && abstracao["Contexto"] !== "") {
                    tabelaHtml = `<table class="tabela-abstracao"><tbody>`;
                    for (const [chave, valor] of Object.entries(abstracao)) {
                        if (valor && valor.trim() !== "") {
                            tabelaHtml += `<tr><td><strong>${chave}</strong></td><td>${valor}</td></tr>`;
                        }
                    }
                    tabelaHtml += `</tbody></table>`;
                }

                const div = document.createElement('div');
                div.className = 'mensagem bot';
                div.innerHTML = `<div class="texto"><strong>Analista SIRP:</strong><br>${tabelaHtml}${msg}</div>`;
                chatBox.insertBefore(div, typingIndicator);
                rolarFinal();

                // Se terminou, trava o input e abre o Modal
                if (concluido) {
                    input.disabled = true;
                    btnEnviar.disabled = true;
                    input.placeholder = "Relato concluído e em processamento...";
                    document.getElementById('modal-final-sirp').classList.add('ativo');
                }
            }

            async function enviar() {
                const txt = input.value.trim();
                if (!txt) return;

                renderizarUser(txt);
                input.value = '';
                input.disabled = true;
                btnEnviar.disabled = true;
                typingIndicator.style.display = 'flex';
                rolarFinal();

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mensagem: txt })
                    });
                    const data = await res.json();
                    typingIndicator.style.display = 'none';
                    input.disabled = false;
                    btnEnviar.disabled = false;
                    input.focus();

                    renderizarBot(data.mensagem || data.resposta_bot, data.abstracao || data.dossie_parcial, data.concluido || data.finalizado);
                } catch (e) {
                    typingIndicator.style.display = 'none';
                    renderizarBot("⚠️ Houve um erro ao processar. Tente novamente.");
                    input.disabled = false;
                    btnEnviar.disabled = false;
                }
            }

            btnEnviar.onclick = enviar;
            input.onkeydown = (e) => { if (e.key === 'Enter') enviar(); };

            btnRefresh.onclick = () => {
                if (confirm("Deseja realmente limpar o histórico e reiniciar o relato?")) {
                    fetch('/api/reset', { method: 'POST' })
                        .then(res => res.json())
                        .then(data => {
                            document.querySelectorAll('.mensagem').forEach(el => el.remove());
                            renderizarBot(data.mensagem_inicial || data.message);
                            input.disabled = false;
                            btnEnviar.disabled = false;
                            input.placeholder = "Descreva o gargalo ou sua ideia...";
                        });
                }
            };
        });

        // FUNÇÕES DO MODAL FINAL
        function ativarSeletorMidia(tipo) {
            const input = document.getElementById('input-midia-final');
            input.accept = tipo;
            input.click();
        }

        function processarMidiaFinal(input) {
            const arquivo = input.files[0];
            if (!arquivo) return;

            const formData = new FormData();
            formData.append('arquivo', arquivo);

            const preview = document.getElementById('preview-modal-box');
            preview.style.display = 'block';
            preview.innerHTML = `<p style="color: var(--laranja);">Processando mídia no servidor...</p>`;

            fetch('/api/upload_final', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(dados => {
                    if (dados.success) {
                        preview.innerHTML = `<p style="color: #4cd137;">Anexo salvo! Redirecionando...</p>`;
                        setTimeout(encerrarEIrParaPerfil, 1500);
                    } else {
                        preview.innerHTML = `<p style="color: #e84118;">Erro ao anexar arquivo.</p>`;
                    }
                });
        }

        function encerrarEIrParaPerfil() {
            document.getElementById('modal-final-sirp').classList.remove('ativo');
            document.body.style.transition = 'opacity 0.8s ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = "perfil.html"; }, 800);
        }
    </script>
</body>
</html>
