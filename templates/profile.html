<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
</head>
<body>

    <main class="profile-container">
        <h1>Perfil do Usuário</h1>
        
        <section class="current-credentials" style="background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <h2>Suas Credenciais Atuais</h2>
            <p><strong>Nome de Usuário:</strong> {{ user.username }}</p>
            <p><strong>E-mail cadastrado:</strong> {{ user.email }}</p>
            <p><strong>Telefone:</strong> {{ user.tellNum }}</p>
            <p><strong>Senha:</strong> ********</p>
        </section>

        <section class="profile-modification">
            <h2>Modificar Informações</h2>

            <form action="/api/profile/update-username" method="POST" class="profile-field-group">
                <label for="username">Novo Nome de Usuário:</label>
                <div class="input-with-btn">
                    <input type="text" id="username" name="username" placeholder="Digite o novo username" required disabled>
                    <button type="button" class="btn-edit" onclick="toggleEdit('username')">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
            </form>

            <form action="/api/profile/update-tellNum" method="POST" class="profile-field-group">
                <label for="tellNum">Novo Telefone:</label>
                <div class="input-with-btn">
                    <input type="text" id="tellNum" name="tellNum" placeholder="Digite o novo telefone" required disabled>
                    <button type="button" class="btn-edit" onclick="toggleEdit('tellNum')">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
            </form>

            <form action="/api/profile/update-password" method="POST" class="profile-field-group">
                <label for="password">Nova Senha:</label>
                <div class="input-with-btn">
                    <input type="password" id="password" name="password" placeholder="Digite a nova senha" required disabled>
                    <button type="button" class="btn-edit" onclick="toggleEdit('password')">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
            </form>

        </section>

        <footer class="profile-actions" style="margin-top: 30px;">
            <form action="/api/profile/delete-account" method="POST" onsubmit="return confirmarDelecao()">
                <button type="submit" class="btn-danger">
                    <i class="fas fa-trash-alt"></i> Deletar Conta
                </button>
            </form>

            <a href="/landing-page" class="btn-secondary">Voltar</a>
        </footer>
    </main>

    <script>
        function toggleEdit(fieldId) {
            const input = document.getElementById(fieldId);
            const button = input.nextElementSibling;
            
            if (input.disabled) {
                input.disabled = false;
                input.focus();
                button.innerHTML = '<i class="fas fa-check" style="color: green;"></i>';
                button.type = 'submit'; 
            }
        }

        function confirmarDelecao() {
            return confirm("⚠️ Tem certeza absoluta que deseja deletar sua conta? Esta ação não pode ser desfeita.");
        }
    </script>
</body>
</html>
