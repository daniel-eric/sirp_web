<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRP - Feed de Problemas</title>
</head>
<body>

    <!-- Layout centralizado acompanhando o esboço da imagem -->
    <main style="max-width: 400px; margin: 40px auto; text-align: center; font-family: sans-serif;">
        
        <!-- Título Principal -->
        <h1 style="font-size: 3rem; letter-spacing: 2px; margin-bottom: 20px;">SIRP</h1>

        <!-- ==================== SEÇÃO DE FILTROS ==================== -->
        <form action="/problems-feed" method="GET" style="margin-bottom: 30px;">
            <p style="font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px;">Filtrar Problemas</p>
            
            <!-- Filtro 1: Título -->
            <div style="margin-bottom: 15px;">
                <input type="text" name="title" placeholder="TÍTULO" style="width: 100%; padding: 10px; text-align: center; border: 1px solid #000; border-radius: 8px; box-sizing: border-box;">
            </div>

            <!-- Filtro 2: Áreas Relacionadas -->
            <div style="margin-bottom: 15px;">
                <input type="text" name="areas" placeholder="ÁREAS RELACIONADAS" style="width: 100%; padding: 10px; text-align: center; border: 1px solid #000; border-radius: 8px; box-sizing: border-box;">
            </div>

            <!-- Filtro 3: Autor -->
            <div style="margin-bottom: 15px;">
                <input type="text" name="author" placeholder="AUTOR(ES)" style="width: 100%; padding: 10px; text-align: center; border: 1px solid #000; border-radius: 8px; box-sizing: border-box;">
            </div>

            <!-- Filtro 4: Tempo de Emissão -->
            <div style="margin-bottom: 20px;">
                <input type="text" name="time" placeholder="TEMPO DE EMISSÃO" style="width: 100%; padding: 10px; text-align: center; border: 1px solid #000; border-radius: 8px; box-sizing: border-box;">
            </div>

            <!-- Botão Invisível/Apenas para submeter ao apertar Enter, ou você pode estilizar um botão aqui -->
            <button type="submit" style="display: none;"></button>
        </form>

        <!-- ==================== BOX DO FEED DE PROBLEMAS ==================== -->
        <section style="border: 1px solid #000; border-radius: 4px; padding: 20px 15px; min-height: 350px; margin-bottom: 30px; text-align: center;">
            <h2 style="font-size: 1rem; font-weight: bold; text-transform: uppercase; margin-top: 0; margin-bottom: 30px;">Feed de Problemas</h2>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <!-- O Jinja2 vai percorrer a lista 'problems' enviada pelo FastAPI -->
                {% for problem in problems %}
                    <div style="padding: 10px; border: 1px dashed #ccc; border-radius: 4px;">
                        <!-- Link para abrir os detalhes do problema específico futuramente -->
                        <a href="/problems/{{ problem.id }}" style="color: #000; text-decoration: none; font-weight: bold; display: block; text-transform: uppercase;">
                            {{ problem.title }}
                        </a>
                        <span style="font-size: 0.8rem; color: #666; display: block; margin-top: 5px;">
                            Áreas: {{ problem.areas }} | Por: {{ problem.authors }}
                        </span>
                    </div>
                {% else %}
                    <!-- Mensagem exibida caso o banco de dados esteja vazio ou nenhum filtro bata -->
                    <p style="color: #666; font-style: italic; margin-top: 5px;">Nenhum problema encontrado.</p>
                {% endfor %}
            </div>
        </section>

        <!-- ==================== BOTÃO VOLTAR ==================== -->
        <footer>
            <a href="/landing-page" style="display: inline-block; padding: 10px 30px; text-transform: uppercase; font-size: 0.9rem; color: #000; background: #fff; border: 1px solid #000; border-radius: 8px; text-decoration: none;">
                Voltar
            </a>
        </footer>

    </main>

</body>
</html>
