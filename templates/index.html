<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <h1>Login</h1>

    <div style="max-width: 300px; margin: 50px auto; font-family: sans-serif;">
        <!--Seção de login-->
        <form action="/login" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="username">Usuário:</label><br>
                <input type="text" id="username" name="usernameInput" required style="width: 100%; padding: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="password">Senha:</label><br>
                <input type="password" id="password" name="passwordInput" required style="width: 100%; padding: 8px;">
            </div>

            <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer;">
                Entrar
            </button>

        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            Não tem uma conta? <a href="/sign-up">Cadastre-se</a>
        </p>

    </div>
</body>

</html>
