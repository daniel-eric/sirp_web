<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .button-row a,
        .red-button {
            display: inline-block;
            padding: 14px 28px;
            text-decoration: none;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .button-row a {
            background-color: #007bff;
        }
        .button-row a:hover {
            background-color: #0056c1;
        }
        .red-button {
            background-color: #dc3545;
        }
        .red-button:hover {
            background-color: #b02a37;
        }
    </style>
</head>
<body>
    
    <h1>Página principal</h1>

    <div class="container">
        <div class="button-row">
            <a href="profile">Perfil</a>
            <a href="problems-feed">Feed de Problemas</a>
            <a href="problems-manager">Gerenciar Problemas</a>
        </div>
        <a class="red-button" href="/">Sair</a>
    </div>

</body>
</html>
